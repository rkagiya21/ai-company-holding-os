name: AI Company OS Daily
# v3 - fixed import paths

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r AI/requirements.txt

      - name: Run scheduler
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          DIFY_KINDLE_WF_KEY: ${{ secrets.DIFY_KINDLE_WF_KEY }}
          DIFY_NOTE_WF_KEY: ${{ secrets.DIFY_NOTE_WF_KEY }}
          DIFY_YOUTUBE_WF_KEY: ${{ secrets.DIFY_YOUTUBE_WF_KEY }}
          DIFY_SNS_WF_KEY: ${{ secrets.DIFY_SNS_WF_KEY }}
        run: |
          cd AI
          python scheduler.py
